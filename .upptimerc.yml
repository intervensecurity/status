# Interven status page config — drop this file into a fresh GitHub repo
# (e.g. github.com/intervensecurity/status), enable GitHub Pages from the
# `gh-pages` branch, and the GitHub Actions Upptime workflow will publish a
# hosted status site at status.intervensecurity.com (after CNAME setup).
#
# See setup steps in services/docs/.../status.md or infra/status-page/README.md.

owner: intervensecurity
repo: status

sites:
  - name: API gateway
    url: https://api.intervensecurity.com/health
    expectedStatusCodes:
      - 200
    icon: https://intervensecurity.com/favicon.ico

  - name: Console
    url: https://app.intervensecurity.com/api/auth/me
    # /api/auth/me returns 200 when there's no session (with a JSON 401 body).
    # 401 is expected here — Upptime treats it as "service is up, just rejecting
    # this request". Use a different endpoint if you want stricter checks.
    expectedStatusCodes:
      - 200
      - 401
    icon: https://intervensecurity.com/favicon.ico

  - name: Docs
    url: https://docs.intervensecurity.com
    expectedStatusCodes:
      - 200
    icon: https://intervensecurity.com/favicon.ico

  - name: Telemetry (internal)
    # Telemetry is bound to 127.0.0.1 on the gateway VPS — Upptime runs from
    # GitHub-hosted runners and CANNOT reach it directly. Comment this out
    # for the public status page; uncomment if you self-host Upptime inside
    # your VPC.
    # url: https://telemetry.internal.intervensecurity.com/health
    # expectedStatusCodes:
    #   - 200

# Status page configuration
status-website:
  cname: status.intervensecurity.com
  logoUrl: https://intervensecurity.com/logo.png
  name: Interven Status
  introTitle: Interven service status
  introMessage: |
    Real-time uptime for the Interven gateway, console, and docs site. Probes run
    every 5 minutes from GitHub Actions runners. Subscribe to RSS for incidents
    and scheduled maintenance.
  navbar:
    - title: Home
      href: /
    - title: Incidents
      href: /history
    - title: Docs
      href: https://docs.intervensecurity.com
    - title: Console
      href: https://app.intervensecurity.com

# Notifications: set the SLACK_WEBHOOK_URL or DISCORD_WEBHOOK_URL secret in
# the GitHub repo to get pinged when a probe fails.
notifications:
  - type: slack
    channel: alerts-status
    helpText: We'll DM you when a service goes down

assignees:
  - boltyx0    # GitHub username — auto-assigns incidents to you
