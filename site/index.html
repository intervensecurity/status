<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interven Status</title>
  <meta name="description" content="Real-time uptime for Interven AI Agent Identity Firewall services.">
  <link rel="icon" href="https://intervensecurity.com/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0a0a14">
  <meta property="og:title" content="Interven Status">
  <meta property="og:description" content="Real-time uptime for Interven services.">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a14;
      --bg-elev: #14141e;
      --bg-elev-2: #1a1a26;
      --border: #25252e;
      --border-strong: #353541;
      --text: #f5f5f7;
      --text-muted: #86868b;
      --text-dim: #57575e;
      --accent: #4F46E5;
      --accent-hover: #6366f1;
      --green: #10B981;
      --green-bg: rgba(16, 185, 129, 0.12);
      --green-border: rgba(16, 185, 129, 0.3);
      --yellow: #F59E0B;
      --yellow-bg: rgba(245, 158, 11, 0.12);
      --yellow-border: rgba(245, 158, 11, 0.3);
      --red: #EF4444;
      --red-bg: rgba(239, 68, 68, 0.12);
      --red-border: rgba(239, 68, 68, 0.3);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', SFMono-Regular, Consolas, monospace;
    }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      background-image:
        radial-gradient(at 25% 0%, rgba(79, 70, 229, 0.08) 0px, transparent 50%),
        radial-gradient(at 75% 0%, rgba(16, 185, 129, 0.04) 0px, transparent 50%);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ----- Header ----- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      background: rgba(10, 10, 20, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .brand img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .brand-status {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      margin-left: 4px;
    }

    nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background-color 0.15s;
    }

    nav a:hover {
      color: var(--text);
      background: var(--bg-elev);
    }

    /* ----- Main ----- */
    main {
      padding: 56px 0 24px;
    }

    /* ----- Hero ----- */
    #status-hero {
      padding: 28px 32px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      margin-bottom: 56px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s;
    }

    #status-hero.operational {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.06) 0%, rgba(20, 20, 30, 1) 60%);
      border-color: var(--green-border);
    }

    #status-hero.degraded {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.06) 0%, rgba(20, 20, 30, 1) 60%);
      border-color: var(--yellow-border);
    }

    #status-hero.outage {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.06) 0%, rgba(20, 20, 30, 1) 60%);
      border-color: var(--red-border);
    }

    .hero-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #status-hero.operational .hero-icon { background: var(--green-bg); }
    #status-hero.degraded .hero-icon { background: var(--yellow-bg); }
    #status-hero.outage .hero-icon { background: var(--red-bg); }

    .hero-icon svg { width: 24px; height: 24px; }
    #status-hero.operational .hero-icon svg { stroke: var(--green); }
    #status-hero.degraded .hero-icon svg { stroke: var(--yellow); }
    #status-hero.outage .hero-icon svg { stroke: var(--red); }

    #status-hero h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    #status-hero p {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ----- Section headings ----- */
    section { margin-bottom: 48px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .section-header .timeframe-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px;
    }

    .timeframe-tab {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      background: transparent;
      border: none;
      font-family: inherit;
    }

    .timeframe-tab.active {
      background: var(--bg-elev-2);
      color: var(--text);
    }

    .timeframe-tab:hover:not(.active) {
      color: var(--text);
    }

    /* ----- Service card ----- */
    .service-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.15s, background-color 0.15s;
    }

    .service-card:hover {
      border-color: var(--border-strong);
    }

    .service-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .service-info { min-width: 0; flex: 1; }

    .service-info h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }

    .service-info p {
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-mono);
    }

    .service-meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .uptime-stat {
      text-align: right;
      min-width: 56px;
    }

    .uptime-stat-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .uptime-stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
      font-weight: 500;
    }

    .status-pill {
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .status-pill.green { background: var(--green-bg); color: var(--green); }
    .status-pill.yellow { background: var(--yellow-bg); color: var(--yellow); }
    .status-pill.red { background: var(--red-bg); color: var(--red); }
    .status-pill.gray { background: var(--bg-elev-2); color: var(--text-muted); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.green {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.18);
      animation: pulse-green 2.5s ease-in-out infinite;
    }
    .status-dot.yellow { background: var(--yellow); box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18); }
    .status-dot.red {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
      animation: pulse-red 1.5s ease-in-out infinite;
    }
    .status-dot.gray { background: var(--text-dim); }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.18); }
      50% { box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.06); }
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18); }
      50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.04); }
    }

    /* ----- Uptime bar (90-day style) ----- */
    .uptime-bar {
      display: flex;
      gap: 2px;
      margin-top: 16px;
      height: 28px;
      align-items: flex-end;
    }

    .uptime-bar-segment {
      flex: 1;
      min-width: 2px;
      height: 100%;
      border-radius: 1px;
      background: var(--green);
      opacity: 0.85;
      transition: opacity 0.15s;
      position: relative;
    }

    .uptime-bar-segment:hover { opacity: 1; }
    .uptime-bar-segment.yellow { background: var(--yellow); }
    .uptime-bar-segment.red { background: var(--red); }
    .uptime-bar-segment.gray { background: var(--bg-elev-2); }

    .uptime-bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    /* ----- Incidents ----- */
    .panel {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .incident-item {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      transition: background-color 0.15s;
    }

    .incident-item:last-child { border-bottom: none; }
    .incident-item:hover { background: var(--bg-elev-2); }

    .incident-item a {
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .incident-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .incident-title {
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.005em;
    }

    .incident-time {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .empty-state {
      padding: 32px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--green-bg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .empty-state-icon svg { width: 20px; height: 20px; stroke: var(--green); }

    /* ----- Subscribe / Links ----- */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .link-card {
      padding: 18px 20px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .link-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .link-card-title {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .link-card-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .link-card-arrow {
      color: var(--text-dim);
      transition: color 0.15s, transform 0.15s;
    }

    .link-card:hover .link-card-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    /* ----- Footer ----- */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0 40px;
      margin-top: 56px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--text); }

    /* ----- Skeleton loading ----- */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-elev) 0%, var(--bg-elev-2) 50%, var(--bg-elev) 100%);
      background-size: 200% 100%;
      animation: skeleton 1.5s ease-in-out infinite;
      border-radius: 4px;
      color: transparent;
    }

    @keyframes skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ----- Mobile ----- */
    @media (max-width: 720px) {
      main { padding-top: 32px; }
      #status-hero { padding: 20px; }
      #status-hero h1 { font-size: 17px; }
      .service-card { padding: 16px 18px; }
      .service-row { flex-direction: column; align-items: flex-start; gap: 14px; }
      .service-meta { width: 100%; justify-content: space-between; gap: 16px; }
      .uptime-stat { min-width: auto; text-align: left; }
      .links-grid { grid-template-columns: 1fr; }
      nav { gap: 0; }
      nav a { padding: 6px 8px; font-size: 12px; }
      .brand-status { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <a href="/" class="brand">
        <img src="https://intervensecurity.com/favicon.png" alt="Interven" onerror="this.style.display='none'">
        <span>Interven</span>
        <span class="brand-status">Status</span>
      </a>
      <nav>
        <a href="https://intervensecurity.com">Home</a>
        <a href="https://docs.intervensecurity.com">Docs</a>
        <a href="https://app.intervensecurity.com">Console</a>
        <a href="https://github.com/intervensecurity/status/issues" target="_blank" rel="noopener">History</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">

      <div id="status-hero">
        <div class="hero-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div>
          <h1 id="hero-title">Loading…</h1>
          <p id="hero-subtitle">Fetching the latest service metrics.</p>
        </div>
      </div>

      <section>
        <div class="section-header">
          <h2>Components</h2>
          <div class="timeframe-tabs" role="tablist" id="timeframe-tabs">
            <button class="timeframe-tab" data-tf="day">24h</button>
            <button class="timeframe-tab" data-tf="week">7d</button>
            <button class="timeframe-tab active" data-tf="month">30d</button>
            <button class="timeframe-tab" data-tf="year">1y</button>
            <button class="timeframe-tab" data-tf="all">All</button>
          </div>
        </div>
        <div id="service-list"></div>
      </section>

      <section>
        <div class="section-header">
          <h2>Past incidents</h2>
        </div>
        <div class="panel" id="incident-list">
          <div class="empty-state">
            <div class="skeleton" style="height: 14px; width: 200px; margin: 0 auto;"></div>
          </div>
        </div>
      </section>

      <section>
        <div class="section-header">
          <h2>Subscribe &amp; report</h2>
        </div>
        <div class="links-grid">
          <a class="link-card" href="https://github.com/intervensecurity/status/issues.atom" target="_blank" rel="noopener">
            <div>
              <div class="link-card-title">RSS feed</div>
              <div class="link-card-desc">Get notified of every incident</div>
            </div>
            <svg class="link-card-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
          <a class="link-card" href="mailto:support@intervensecurity.com?subject=Service%20issue%20report">
            <div>
              <div class="link-card-title">Report an issue</div>
              <div class="link-card-desc">support@intervensecurity.com</div>
            </div>
            <svg class="link-card-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </section>

    </div>
  </main>

  <footer>
    <div class="container footer-content">
      <div>
        Interven Security · AI Agent Identity Firewall ·
        <span id="last-update">—</span>
      </div>
      <div class="footer-links">
        <a href="https://intervensecurity.com/privacy">Privacy</a>
        <a href="https://intervensecurity.com/terms">Terms</a>
        <a href="https://github.com/intervensecurity/status" target="_blank" rel="noopener">Source</a>
      </div>
    </div>
  </footer>

  <script>
    /* -------------------------------------------------------------------------
     * Interven Status — vanilla JS, no build step.
     *
     * Reads Upptime-generated JSON metrics from `api/<slug>/*.json` (these
     * files are placed in this folder by the same workflow that deploys this
     * site). Reads recent incidents from the GitHub Issues API.
     * ----------------------------------------------------------------------- */

    const SERVICES = [
      { slug: 'api-gateway', name: 'API Gateway',  subtitle: 'api.intervensecurity.com' },
      { slug: 'console',     name: 'Console',      subtitle: 'app.intervensecurity.com' },
      { slug: 'docs',        name: 'Documentation', subtitle: 'docs.intervensecurity.com' },
    ];

    const REPO_OWNER = 'intervensecurity';
    const REPO_NAME  = 'status';

    let activeTimeframe = 'month';

    function parsePct(message) {
      if (!message) return null;
      const m = String(message).match(/(\d+(?:\.\d+)?)/);
      return m ? parseFloat(m[1]) : null;
    }

    function pctColor(pct) {
      if (pct === null || pct === undefined) return 'gray';
      if (pct >= 99.5) return 'green';
      if (pct >= 95)   return 'yellow';
      return 'red';
    }

    async function fetchJSON(path) {
      try {
        const r = await fetch(path, { cache: 'no-store' });
        if (!r.ok) return null;
        return await r.json();
      } catch { return null; }
    }

    async function loadService(svc) {
      const base = `api/${svc.slug}`;
      const [overall, day, week, month, year, rt] = await Promise.all([
        fetchJSON(`${base}/uptime.json`),
        fetchJSON(`${base}/uptime-day.json`),
        fetchJSON(`${base}/uptime-week.json`),
        fetchJSON(`${base}/uptime-month.json`),
        fetchJSON(`${base}/uptime-year.json`),
        fetchJSON(`${base}/response-time.json`),
      ]);
      return { svc, overall, day, week, month, year, rt };
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#039;');
    }

    function pickByTimeframe(data, tf) {
      switch (tf) {
        case 'day':   return data.day;
        case 'week':  return data.week;
        case 'month': return data.month;
        case 'year':  return data.year;
        case 'all':
        default:      return data.overall;
      }
    }

    function renderServiceCard(data) {
      const tfData = pickByTimeframe(data, activeTimeframe);
      const pct = parsePct(tfData?.message);
      const color = pctColor(pct);
      const label = color === 'green' ? 'Operational'
                  : color === 'yellow' ? 'Degraded'
                  : color === 'red' ? 'Outage'
                  : 'No data';

      const dayPct   = data.day?.message   || '—';
      const monthPct = data.month?.message || '—';
      const rtVal    = data.rt?.message    || '—';

      return `
        <div class="service-card">
          <div class="service-row">
            <div class="service-info">
              <h3>${escapeHtml(data.svc.name)}</h3>
              <p>${escapeHtml(data.svc.subtitle)}</p>
            </div>
            <div class="service-meta">
              <div class="uptime-stat">
                <div class="uptime-stat-value">${escapeHtml(dayPct)}</div>
                <div class="uptime-stat-label">24h</div>
              </div>
              <div class="uptime-stat">
                <div class="uptime-stat-value">${escapeHtml(monthPct)}</div>
                <div class="uptime-stat-label">30d</div>
              </div>
              <div class="uptime-stat">
                <div class="uptime-stat-value">${escapeHtml(rtVal)}</div>
                <div class="uptime-stat-label">Response</div>
              </div>
              <span class="status-pill ${color}">
                <span class="status-dot ${color}"></span>
                ${label}
              </span>
            </div>
          </div>
        </div>
      `;
    }

    function renderHero(allData) {
      const colors = allData.map(d => pctColor(parsePct(d.overall?.message)));
      let state, title, subtitle, icon;
      if (colors.includes('red')) {
        state = 'outage';
        title = 'Service disruption';
        subtitle = 'One or more services are currently experiencing an outage. Our team is investigating.';
        icon = `<path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>`;
      } else if (colors.includes('yellow')) {
        state = 'degraded';
        title = 'Partial degradation';
        subtitle = 'Some services are experiencing degraded performance. Most functionality remains available.';
        icon = `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`;
      } else if (colors.includes('gray')) {
        state = '';
        title = 'Awaiting first probe';
        subtitle = 'Setting up monitoring. Initial metrics should appear within 5 minutes.';
        icon = `<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`;
      } else {
        state = 'operational';
        title = 'All systems operational';
        subtitle = 'All Interven services are up and running normally.';
        icon = `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`;
      }
      const hero = document.getElementById('status-hero');
      hero.className = state;
      hero.querySelector('.hero-icon svg').innerHTML = icon;
      document.getElementById('hero-title').textContent = title;
      document.getElementById('hero-subtitle').textContent = subtitle;
    }

    async function renderServices() {
      const all = await Promise.all(SERVICES.map(loadService));
      renderHero(all);
      document.getElementById('service-list').innerHTML =
        all.map(renderServiceCard).join('');
    }

    function formatTimeAgo(iso) {
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      if (diff < 86400 * 30) return `${Math.floor(diff/86400)}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    async function loadIncidents() {
      try {
        const r = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=all&per_page=10&labels=incident`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        if (!r.ok) return [];
        return await r.json();
      } catch { return []; }
    }

    function renderIncidents(items) {
      const el = document.getElementById('incident-list');
      if (!items.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div>No incidents in the last 90 days.</div>
            <div style="font-size:12px; margin-top:4px; color: var(--text-dim);">All systems have been stable.</div>
          </div>`;
        return;
      }
      el.innerHTML = items.map(i => {
        const resolved = i.state === 'closed';
        return `
          <div class="incident-item">
            <a href="${escapeHtml(i.html_url)}" target="_blank" rel="noopener">
              <div class="incident-header">
                <span class="status-pill ${resolved ? 'green' : 'yellow'}">
                  <span class="status-dot ${resolved ? 'green' : 'yellow'}"></span>
                  ${resolved ? 'Resolved' : 'Investigating'}
                </span>
                <span class="incident-title">${escapeHtml(i.title)}</span>
              </div>
              <div class="incident-time">${formatTimeAgo(i.created_at)} · ${new Date(i.created_at).toLocaleString()}</div>
            </a>
          </div>`;
      }).join('');
    }

    function setupTimeframeTabs() {
      document.querySelectorAll('.timeframe-tab').forEach(btn => {
        btn.addEventListener('click', async () => {
          document.querySelectorAll('.timeframe-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeTimeframe = btn.dataset.tf;
          await renderServices();
        });
      });
    }

    function updateTimestamp() {
      const now = new Date();
      document.getElementById('last-update').textContent =
        `Updated ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    }

    async function init() {
      setupTimeframeTabs();
      await renderServices();
      updateTimestamp();
      loadIncidents().then(renderIncidents);
    }

    init();
    // Refresh probes every 60 seconds; incidents every 5 minutes.
    setInterval(async () => { await renderServices(); updateTimestamp(); }, 60_000);
    setInterval(() => loadIncidents().then(renderIncidents), 5 * 60_000);
  </script>
</body>
</html>
